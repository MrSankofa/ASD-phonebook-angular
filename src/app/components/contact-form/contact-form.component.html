<div class="container">
    <h1>Add Contact</h1>

    <form [formGroup]="contactForm" (ngSubmit)="onSubmit()">
        <div class="form-group">
            <label for="firstName">First Name</label>
            <input id="firstName" type="text" class="form-control" formControlName="firstName">
            <div *ngIf="submitted && contactForm.get('firstName')?.invalid" class="alert alert-danger">
                First Name is required.
            </div>
        </div>

        <div class="form-group">
            <label for="lastName">Last Name</label>
            <input id="lastName" type="text" class="form-control" formControlName="lastName">
            <div *ngIf="submitted && contactForm.get('lastName')?.invalid" class="alert alert-danger">
                Last Name is required.
            </div>
        </div>

        <div class="form-group">
            <label for="email">Email</label>
            <input id="email" type="email" class="form-control" formControlName="email">
            <div *ngIf="submitted && contactForm.get('email')?.invalid" class="alert alert-danger">
                <div *ngIf="contactForm.get('email')?.errors?.['required']">Email is required.</div>
                <div *ngIf="contactForm.get('email')?.errors?.['email']">Invalid email address.</div>
            </div>
        </div>

        <button type="submit" class="btn btn-success">{{ btnName }}</button>
    </form>
</div>
